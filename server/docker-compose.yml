services:
  apple-monitor:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:${PORT:-8787}/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
